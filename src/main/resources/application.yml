spring:
  application:
    name: mezo-pos

  datasource:
    url: jdbc:h2:mem:mezo
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 3MB
      max-request-size: 3MB

mezo:
  jwt:
    secret: ${JWT_SECRET:default-dev-secret-change-in-production-must-be-at-least-256-bits-long-for-hs256}
    access-token-expiration: 28800000    # 8 hours
    refresh-token-expiration: 604800000  # 7 days
  otp:
    expiration-minutes: 10
    max-attempts: 3
    block-duration-minutes: 15
  resend:
    api-key: ${RESEND_API_KEY:re_Pf5Ze1M9_CHkbym5Fe7JGoMvjQxArd3pd}
    from-email: "Mezo <noreply@example.com>"
  wompi:
    public-key: ${WOMPI_PUBLIC_KEY:}
    private-key: ${WOMPI_PRIVATE_KEY:}
    events-secret: ${WOMPI_EVENTS_SECRET:}
    redirect-url: ${WOMPI_REDIRECT_URL:http://localhost:3000/plans/success}
  storage:
    upload-dir: ./uploads
    base-url: ${STORAGE_BASE_URL:http://localhost:8080/uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
